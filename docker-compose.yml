services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tg-sync-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_sync_files}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT}:${POSTGRES_PORT}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend WebSocket Server
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tg-sync-backend
    ports:
      - "${BACKEND_WS_PORT}:${BACKEND_WS_PORT}"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=${POSTGRES_HOST_DOCKER}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_DB=${POSTGRES_DB:-tg_sync_files}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_CHANNEL_IDS=${TELEGRAM_CHANNEL_IDS}
      - WATCH_DIR=${WATCH_DIR}
      - BACKEND_WS_PORT=${BACKEND_WS_PORT}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - ${WATCH_DIR}:/app/watch-dir:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Next.js BFF
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_WS_ENDPOINT: ${NEXT_PUBLIC_WS_ENDPOINT}
        FRONTEND_PORT: ${FRONTEND_PORT}
    container_name: tg-sync-frontend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - NEXT_PUBLIC_WS_ENDPOINT=${NEXT_PUBLIC_WS_ENDPOINT}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
