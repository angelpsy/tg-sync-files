services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: tg-sync-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tg_sync_files}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend WebSocket Server
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tg-sync-backend
    ports:
      - "4000:4000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-tg_sync_files}
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_CHANNEL_IDS=${TELEGRAM_CHANNEL_IDS}
      - WATCH_DIR=${WATCH_DIR}
      - BACKEND_WS_PORT=4000
      - WS_ENDPOINT=ws://localhost:4000
    volumes:
      - ${WATCH_DIR}:/app/watch-dir:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Frontend Next.js BFF
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: tg-sync-frontend
    ports:
      - "3000:3000"
    environment:
      - WS_ENDPOINT=ws://backend:4000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET:-development-secret-key}
      - NEXTAUTH_URL=http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
