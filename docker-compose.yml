services:
  # Backend WebSocket Server
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tg-sync-backend
    ports:
      - "${BACKEND_WS_PORT}:${BACKEND_WS_PORT}"
    environment:
      - TELEGRAM_API_ID=${TELEGRAM_API_ID}
      - TELEGRAM_API_HASH=${TELEGRAM_API_HASH}
      - TELEGRAM_CHANNEL_IDS=${TELEGRAM_CHANNEL_IDS}
      - WATCH_DIR=${WATCH_DIR}
      - BACKEND_WS_PORT=${BACKEND_WS_PORT}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DATABASE_URL=file:/app/backend/prisma/db.sqlite
    volumes:
      - ${WATCH_DIR}:/app/watch-dir:ro
      - backend_data:/app/backend/prisma
    restart: unless-stopped

  # Frontend Next.js BFF
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_WS_ENDPOINT: ${NEXT_PUBLIC_WS_ENDPOINT}
        FRONTEND_PORT: ${FRONTEND_PORT}
    container_name: tg-sync-frontend
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - NEXT_PUBLIC_WS_ENDPOINT=${NEXT_PUBLIC_WS_ENDPOINT}
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
    driver: local
